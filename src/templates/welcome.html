<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歡迎使用 LINKER | 專案與工時管理系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #212529 0%, #343a40 100%); color: white; font-family: 'Noto Sans TC', sans-serif; }
        .hero-section { height: 100vh; display: flex; align-items: center; }
        .feature-card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 15px; padding: 20px; transition: transform 0.3s; }
        .feature-card:hover { transform: translateY(-5px); background: rgba(255, 255, 255, 0.1); }
        .btn-tester { background-color: #ffc107; color: #212529; font-weight: bold; border: none; padding: 15px 30px; border-radius: 50px; font-size: 1.2rem; transition: all 0.3s; }
        .btn-tester:hover { background-color: #ffca2c; transform: scale(1.05); box-shadow: 0 0 20px rgba(255, 193, 7, 0.4); }
    </style>
</head>
<body>

    <section class="hero-section">
        <div class="container text-center">
            <div class="mb-4">
                <i class="fas fa-layer-group text-warning" style="font-size: 5rem;"></i>
            </div>
            <h1 class="display-3 fw-bold mb-3">Project <span class="text-warning">LINKER</span></h1>
            <p class="lead mb-5 text-secondary">高效能的企業內部管理解決方案：整合客戶、專案、報價與工時系統</p>

            <div class="mb-5">
                <a href="/tester" class="btn btn-tester shadow-lg">
                    <i class="fas fa-rocket me-2"></i> 快速開始：以試用管理員進入
                </a>
            </div>

            <div class="row mt-5 justify-content-center">
                <div class="col-md-3 mb-4">
                    <div class="feature-card">
                        <i class="fas fa-shield-alt text-warning mb-3 fs-3"></i>
                        <h5>RBAC 權限管理</h5>
                        <p class="small text-secondary">嚴謹的後端角色控制，確保資料安全與作業合規。</p>
                    </div>
                </div>
                <div class="col-md-3 mb-4">
                    <div class="feature-card">
                        <i class="fas fa-bolt text-warning mb-3 fs-3"></i>
                        <h5>HTMX 驅動</h5>
                        <p class="small text-secondary">無需複雜 JavaScript，實現流暢的 SPA 無跳轉體驗。</p>
                    </div>
                </div>
                <div class="col-md-3 mb-4">
                    <div class="feature-card">
                        <i class="fas fa-database text-warning mb-3 fs-3"></i>
                        <h5>FastAPI 高性能</h5>
                        <p class="small text-secondary">基於異步非同步架構，提供極速的 API 響應能力。</p>
                    </div>
                </div>
            </div>

            <div class="mt-5">
                <a href="/login" class="text-decoration-none text-secondary me-4">標準登入</a>
                <a href="/register" class="text-decoration-none text-secondary">員工註冊</a>
            </div>
        </div>
    </section>

</body>
</html>

{% extends "base.html" %}

{% block title %}註冊帳號{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h3 class="card-title text-center mb-4">員工註冊</h3>
                    
                    <form action="/register" method="POST">
                        <div class="mb-3">
                            <label for="name" class="form-label">員工姓名</label>
                            <input type="text" class="form-control" id="name" name="name" required>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">電子信箱</label>
                            <input type="email" class="form-control" id="email" name="email" required>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">設定密碼</label>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-success">註冊並建立員工資料</button>
                        </div>
                    </form>
                    
                    <div class="mt-3 text-center">
                        <small>已經有帳號了？ <a href="/login">返回登入</a></small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
